name: Publish

on:
  push:
    tags:
      - "v*"

env:
  EMSDK_VERSION: 4.0.23

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python FlatBuffers runtime
        run: python3 -m pip install flatbuffers
      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          cd "$RUNNER_TEMP/emsdk"
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
          source ./emsdk_env.sh > /dev/null
          export PATH="$EMSDK/upstream/bin:$PATH"
          export EM_CONFIG="$RUNNER_TEMP/.emscripten"
          emcc --generate-config
          {
            echo "EMSDK=$EMSDK"
            echo "EM_CONFIG=$EM_CONFIG"
            echo "BINARYEN_ROOT=$EMSDK/upstream/bin"
          } >> "$GITHUB_ENV"
          {
            echo "$EMSDK"
            echo "$EMSDK/upstream/emscripten"
            echo "$EMSDK/upstream/bin"
          } >> "$GITHUB_PATH"
          command -v em++
          command -v wasm-opt
          em++ --version | head -n 1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish
