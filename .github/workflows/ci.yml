name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EMSDK_VERSION: 4.0.23

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python FlatBuffers runtime
        run: python3 -m pip install flatbuffers
      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          cd "$RUNNER_TEMP/emsdk"
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
          source ./emsdk_env.sh > /dev/null
          {
            echo "EMSDK=$EMSDK"
            echo "EM_CONFIG=$EM_CONFIG"
          } >> "$GITHUB_ENV"
          {
            echo "$EMSDK"
            echo "$EMSDK/upstream/emscripten"
          } >> "$GITHUB_PATH"
          command -v em++
          em++ --version | head -n 1
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
